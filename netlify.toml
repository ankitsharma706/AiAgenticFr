[build]
  command = "npm run build"
  publish = "frontend/dist"
  base = "frontend"

[[redirects]]
  from = "/api/*"
  to = "https://your-node-gateway.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/reports/*"
  to = "https://your-node-gateway.onrender.com/reports/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
